name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            mingw-w64-x86_64-gcc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Create output directory
        run: mkdir build
        shell: msys2 {0}

      - name: Build launcher
        run: gcc launcher.c -o build/PlayPepsiman.exe -luser32 -lgdi32 -O2
        shell: msys2 {0}

      - name: Build PepsimanHook DLL
        run: gcc PepsimanHook.c -shared -o build/PepsimanHook.dll -luser32 -lgdi32 -static-libgcc -O2
        shell: msys2 {0}

      - name: Build Injector
        run: gcc Injector.c -o build/Injector.exe -luser32 -lkernel32 -O2
        shell: msys2 {0}

      - name: Package make_portable.py as standalone exe
        run: pyinstaller --onefile --distpath build --name make_portable make_portable.py

      - name: Package extract_pepsi.py as standalone exe
        run: pyinstaller --onefile --distpath build --name extract_pepsi extract_pepsi.py

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PepDesktop-v${{ github.run_number }}
          path: build/*
          if-no-files-found: error

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: PepDesktop v${{ github.run_number }}
          body: |
            Automated build from commit ${{ github.sha }}

            ### Included:
            - `PlayPepsiman.exe` — C launcher
            - `PepsimanHook.dll` — BitBlt hook DLL
            - `Injector.exe` — standalone DLL injector
            - `make_portable.exe` — binary patcher (no Python needed)
            - `extract_pepsi.exe` — asset extractor (no Python needed)
          files: build/*
          fail_on_unmatched_files: false
