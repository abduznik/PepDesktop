name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            mingw-w64-x86_64-gcc

      - name: Build launcher (c launcher)
        run: gcc launcher.c -o build/PlayPepsiman.exe -luser32 -lgdi32 -O2

      - name: Build PepsimanHook DLL
        run: gcc PepsimanHook.c -shared -o build/PepsimanHook.dll -luser32 -lgdi32 -static-libgcc -O2

      - name: Build Injector (standalone DLL injector)
        run: gcc Injector.c -o build/Injector.exe -luser32 -lkernel32 -O2

      - name: Check Python syntax
        run: |
          python -m py_compile make_portable.py
          python -m py_compile extract_pepsi.py

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PepDesktop-v${{ github.run_number }}
          path: |
            build/*.exe
            build/*.dll
            make_portable.py
            extract_pepsi.py
          if-no-files-found: error
